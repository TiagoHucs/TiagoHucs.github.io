<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pixel Art 10x10</title>
  <style>
    body {
      background-color: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(10, 30px);
      grid-template-rows: repeat(10, 30px);
      gap: 2px;
      background-color: gray; /* Grid de fundo cinza */
      padding: 2px;
    }

    .pixel {
      width: 30px;
      height: 30px;
      background-color: black; /* Não pintado */
      cursor: pointer;
    }

    .painted {
      background-color: lime; /* Pintado */
    }
  </style>
</head>
<body>
  <div class="grid" id="pixelGrid"></div>

  <script>
    const grid = document.getElementById('pixelGrid');

    for (let i = 0; i < 100; i++) {
      const pixel = document.createElement('div');
      pixel.classList.add('pixel');
      pixel.addEventListener('click', () => {
        pixel.classList.toggle('painted');
      });
      grid.appendChild(pixel);
    }
  </script>
</body>
</html>
